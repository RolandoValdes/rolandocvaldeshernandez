<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Evidence | Rolando Valdés</title><link rel="stylesheet" href="css/style.css"><script defer src="js/main.js"></script></head><body><div id="nav"></div><main class="wrap"><h1 class="section-title">Searchable Evidence Library</h1><section class="card"><div class="toolbar"><input id="docSearch" oninput="filterDocs()" placeholder="Search DBS, ENIC, CV, QTS, dashboards..."><select id="docCat" onchange="filterDocs()"><option value="all">All categories</option></select></div></section><section id="docs"></section><script>window.pageInit=d=>{const cats=[...new Set(d.documents.map(x=>x.category))];docCat.innerHTML+ cats.map(c=>`<option value="${c}">${c}</option>`).join('');docs.innerHTML=documentCards(d.documents);}</script></main><div id="foot"></div></body></html>
