<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project X Story Studio</title>
    <link rel="stylesheet" href="css/story.css" />
</head>

<body>
    <main class="story-shell">
        <header class="hero">
            <p class="eyebrow">Project X Platform</p>
            <h1>Story Studio</h1>
            <p class="subtitle">
                The media and storytelling engine for the Project X Teaching Operating System.
            </p>
        </header>

        <section class="dashboard">
            <article class="card">
                <h2>Story Catalogue</h2>
                <div id="storyList" class="story-list"></div>
            </article>

            <article class="card story-viewer">
                <div id="storyViewer">
                    <h2>Select a story</h2>
                    <p>Choose a story from the catalogue to read, listen, watch or view its infographic.</p>
                </div>
            </article>
        </section>
    </main>

    <script src="js/story-app.js"></script>
</body>

</html>
