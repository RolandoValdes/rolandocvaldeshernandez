<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Lab | Project X</title>
  <link rel="stylesheet" href="/rolandocvaldeshernandez/projectx/assets/projectx.css" />
</head>
<body>
  <div class="projectx-shell">
    <div id="projectxSidebar"></div>
    <main class="projectx-main">
      <div id="projectxHeader"></div>
      <section class="projectx-content">
        <div class="projectx-card" style="margin-bottom:24px;">
          <span class="projectx-status">Teaching Workspace</span>
          <h2>AI Lab</h2>
          <p>Develop AI-supported tools for lesson planning, worksheet generation, feedback and question creation.</p>
        </div>
        <div class="module-shell">
          <aside class="module-panel">
            <h3>AI Lab Menu</h3>
            <nav id="moduleNavigation" class="module-nav"></nav>
          </aside>
          <section class="module-workspace">
            <h2 id="moduleTitle" style="margin-top:0;">Dashboard</h2>
            <div id="moduleWorkspace"></div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script src="/rolandocvaldeshernandez/projectx/core/navigation-manager.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/theme-manager.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/projectx-loader.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/workspace-engine.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/app-shell.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/bootstrap.js"></script>
  <script>
    window.ProjectXViews = window.ProjectXViews || {};
    window.ProjectXViews['ai_lab_dashboard'] = function(){
      return '<div class="workspace-kpi-grid"><div class="workspace-kpi"><span>Status</span><strong>Ready</strong></div><div class="workspace-kpi"><span>Module</span><strong>v3</strong></div><div class="workspace-kpi"><span>Views</span><strong>Live</strong></div></div><div class="projectx-grid"><div class="projectx-card"><h3>Module Dashboard</h3><p>This module now runs inside the Project X Workspace Engine.</p></div><div class="projectx-card"><h3>Secondary Navigation</h3><p>Use the module menu to switch views without leaving the application shell.</p></div><div class="projectx-card"><h3>Next Build</h3><p>Functional data tools will be added in future sprints.</p></div></div>';
    };
    document.addEventListener('DOMContentLoaded',()=>{const app=new ProjectXApp({moduleKey:'ai_lab',moduleTitle:'AI Lab',moduleSubtitle:'Develop AI-supported tools for lesson planning, worksheet generation, feedback and question creation.',defaultView:'dashboard'});app.initialise();});
  </script>
</body>
</html>
