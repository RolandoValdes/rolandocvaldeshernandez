<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Help Centre | Project X</title><link rel="stylesheet" href="/rolandocvaldeshernandez/projectx/assets/projectx.css"><style>.help-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.help-tag{font-size:.72rem;font-weight:900;color:var(--px-blue);background:var(--px-blue-soft);padding:5px 9px;border-radius:999px}</style></head><body><div class="projectx-shell"><div id="projectxSidebar"></div><main class="projectx-main"><div id="projectxHeader"></div><section class="projectx-content"><div class="projectx-card" style="margin-bottom:24px"><span class="projectx-status">Help</span><h2>Help Centre</h2><p>User-facing guidance for using Project X. Engineering notes and architecture decisions belong in Development Studio.</p></div><div id="helpGrid" class="help-grid"></div></section></main></div><script src="/rolandocvaldeshernandez/projectx/core/navigation-manager.js"></script><script src="/rolandocvaldeshernandez/projectx/core/theme-manager.js"></script><script src="/rolandocvaldeshernandez/projectx/core/projectx-loader.js"></script><script src="/rolandocvaldeshernandez/projectx/core/bootstrap.js"></script><script>const safe=v=>String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));async function init(){const r=await fetch('/rolandocvaldeshernandez/projectx/data/help/help-topics.json',{cache:'no-store'});const d=await r.json();helpGrid.innerHTML=(d.topics||[]).map(t=>`<article class="projectx-card"><span class="help-tag">${safe(t.category)}</span><h3>${safe(t.title)}</h3><p>${safe(t.summary)}</p><span class="projectx-status">${safe(t.status)}</span></article>`).join('')}document.addEventListener('DOMContentLoaded',()=>{init();setTimeout(()=>{projectxPageTitle.textContent='Help Centre';projectxPageSubtitle.textContent='User guidance and support';},200)});</script></body></html>
