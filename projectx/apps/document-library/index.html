<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Document Library | Project X</title><link rel="stylesheet" href="/rolandocvaldeshernandez/projectx/assets/projectx.css"><style>.doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}.doc-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.doc-actions a{font-weight:800;color:var(--px-blue)}</style></head><body><div class="projectx-shell"><div id="projectxSidebar"></div><main class="projectx-main"><div id="projectxHeader"></div><section class="projectx-content"><div class="projectx-card" style="margin-bottom:24px"><span class="projectx-status">Documents</span><h2>Document Library</h2><p>Versioned published documents for Project X. Live engineering tracking belongs in Development Studio.</p></div><div id="docGrid" class="doc-grid"></div></section></main></div><script src="/rolandocvaldeshernandez/projectx/core/navigation-manager.js"></script><script src="/rolandocvaldeshernandez/projectx/core/theme-manager.js"></script><script src="/rolandocvaldeshernandez/projectx/core/projectx-loader.js"></script><script src="/rolandocvaldeshernandez/projectx/core/bootstrap.js"></script><script>const safe=v=>String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));async function init(){const r=await fetch('/rolandocvaldeshernandez/projectx/data/documents/documents.json',{cache:'no-store'});const d=await r.json();docGrid.innerHTML=(d.documents||[]).map(doc=>`<article class="projectx-card"><span class="projectx-status">${safe(doc.category)} · v${safe(doc.version)}</span><h3>${safe(doc.title)}</h3><p>${safe(doc.description)}</p><p><strong>Status:</strong> ${safe(doc.status)}</p><div class="doc-actions"><a href="${safe(doc.pdf)}">Open PDF</a><a href="${safe(doc.docx)}">Download DOCX</a></div></article>`).join('')}document.addEventListener('DOMContentLoaded',()=>{init();setTimeout(()=>{projectxPageTitle.textContent='Document Library';projectxPageSubtitle.textContent='Published documents and versioned files';},200)});</script></body></html>
